<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="720" height="420" fill="#f8fafc"/>

  <!-- container CLI (client) -->
  <g filter="url(#shadow)">
    <rect x="40" y="50" width="200" height="80" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="140" y="85" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">container CLI</text>
  <text x="140" y="108" text-anchor="middle" font-size="13" fill="#64748b">client</text>

  <!-- XPC arrow -->
  <line x1="240" y1="90" x2="408" y2="90" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="324" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">XPC</text>

  <!-- container-apiserver -->
  <g filter="url(#shadow)">
    <rect x="410" y="40" width="270" height="100" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="545" y="72" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">container-apiserver</text>
  <text x="545" y="94" text-anchor="middle" font-size="12" fill="#64748b">+ plugins (XPC services)</text>
  <text x="545" y="113" text-anchor="middle" font-size="12" fill="#94a3b8">/usr/local/libexec/...</text>
  <text x="688" y="36" text-anchor="end" font-size="12" fill="#8b5cf6">launchd 管理</text>

  <!-- apiserver -> VM arrow -->
  <line x1="545" y1="140" x2="545" y2="248" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="555" y="200" text-anchor="start" font-size="12" fill="#475569">Virtualization.framework</text>
  <text x="555" y="218" text-anchor="start" font-size="12" fill="#475569">/ vmnet</text>

  <!-- Linux VM -->
  <g filter="url(#shadow)">
    <rect x="410" y="250" width="270" height="90" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="545" y="288" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Linux VM</text>
  <text x="545" y="310" text-anchor="middle" font-size="12" fill="#64748b">per container</text>
  <text x="545" y="328" text-anchor="middle" font-size="12" fill="#10b981">軽量 VM = 1 コンテナ</text>

  <!-- caption -->
  <text x="40" y="392" font-size="12" fill="#94a3b8">apple/container アーキテクチャ — クライアント・サーバ型（CLI ↔ apiserver は XPC、コンテナごとに軽量 VM）</text>
</svg>
