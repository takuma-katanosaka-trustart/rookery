allowBuilds:
  lefthook: false
# pnpm 設定（pnpm 10.16+ は設定をこのファイルに集約する）

# サプライチェーン対策: パッケージが npm に公開されてから
# 指定分数が経過するまでインストールを許可しない（汚染版の踏み抜き防止）。
# 悪性リリースの多くは公開から 1 時間以内に発見・削除されるため、
# 1 日（1440 分）あれば実用上ほぼ防げる。より慎重にするなら 4320（3 日）等に上げる。
minimumReleaseAge: 1440

# 公開直後でも即時に入れたい例外パッケージがあればここに列挙する（名前単位）。
# minimumReleaseAgeExclude:
#   - "some-internal-package"
